<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D1B2E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Roloy">
  <meta name="description" content="Roloy — Watch Intelligence">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Roloy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --b1: #0D1B2E;
      --b2: #112236;
      --b3: #172C44;
      --b4: #1D3550;
      --b5: #24405E;
      --royal: #1E4080;
      --royal2: #2A549A;
      --royal3: #3060B0;
      --accent: #5080D0;
      --accent2: #90B0E8;
      --accent3: #C8D8F8;
      --highlight: #6090E0;
      --white: #FFFFFF;
      --off-white: #DCE8FA;
      --muted: #5878A0;
      --green: #4A9468;
      --cinzel: 'Cinzel', serif;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--sans);
      background: var(--b1);
      color: var(--white);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── SCREENS ── */
    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }

    /* ── HEADER / LOGO ── */
    .header {
      padding: 12px 18px 10px;
      background: var(--b2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid var(--b4);
      flex-shrink: 0;
      padding-top: max(12px, env(safe-area-inset-top));
    }
    .logo-sub { font-family: var(--cinzel); font-size: 7px; letter-spacing: 4px; color: var(--accent2); opacity: 0.7; }
    .logo-name { font-family: var(--cinzel); font-size: 22px; letter-spacing: 4px; color: var(--white); line-height: 1.1; }
    .logo-rule { width: 50px; height: 0.5px; background: var(--accent2); opacity: 0.3; margin-top: 3px; }
    .header-icon { color: var(--muted); font-size: 20px; background: none; border: none; cursor: pointer; }

    /* ── SEARCH ── */
    .search-wrap {
      padding: 12px 16px;
      background: var(--b2);
      display: flex;
      gap: 8px;
      border-bottom: 0.5px solid var(--b4);
      flex-shrink: 0;
    }
    .search-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--b3);
      border: 0.5px solid var(--b5);
      border-radius: 10px;
      padding: 0 12px;
      gap: 8px;
    }
    .search-input-wrap svg { flex-shrink: 0; }
    .search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--white);
      padding: 10px 0;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-btn {
      background: var(--royal3);
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-family: var(--cinzel);
      font-size: 10px;
      color: var(--white);
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    /* ── SCROLL AREA ── */
    .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .scroll::-webkit-scrollbar { display: none; }
    .pad { padding: 14px 16px; }

    /* ── TAGS ── */
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .tag {
      padding: 5px 12px;
      border-radius: 100px;
      border: 0.5px solid var(--b5);
      font-family: var(--serif);
      font-size: 12px;
      color: var(--accent2);
      cursor: pointer;
      background: none;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: var(--cinzel);
      font-size: 9px;
      color: var(--accent3);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.65;
    }

    /* ── WATCH ROW ── */
    .watch-row {
      background: var(--b3);
      border: 0.5px solid var(--b5);
      border-radius: 14px;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .watch-row:active { opacity: 0.7; }
    .watch-face {
      width: 40px; height: 40px;
      background: var(--b1);
      border-radius: 50%;
      border: 1px solid var(--royal2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .watch-info { flex: 1; min-width: 0; }
    .watch-brand { font-family: var(--cinzel); font-size: 9px; color: var(--accent2); letter-spacing: 1.5px; margin-bottom: 2px; }
    .watch-model { font-family: var(--serif); font-size: 15px; color: var(--white); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .watch-ref { font-family: var(--sans); font-size: 10px; color: var(--muted); }
    .watch-right { text-align: right; flex-shrink: 0; }
    .watch-price { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--white); }
    .watch-trend { font-family: var(--sans); font-size: 10px; color: var(--green); margin-top: 2px; }

    /* ── DETAIL ── */
    .detail-hero {
      padding: 14px 16px 12px;
      background: var(--b3);
      border-bottom: 0.5px solid var(--b5);
      flex-shrink: 0;
    }
    .back-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none;
      font-family: var(--sans); font-size: 11px; color: var(--muted);
      cursor: pointer; margin-bottom: 10px; padding: 0;
    }
    .detail-top { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    .detail-avatar {
      width: 48px; height: 48px;
      background: var(--b1); border-radius: 50%;
      border: 1.5px solid var(--royal2);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .detail-brand { font-family: var(--cinzel); font-size: 9px; color: var(--accent2); letter-spacing: 2px; margin-bottom: 3px; }
    .detail-model { font-family: var(--serif); font-size: 20px; font-weight: 300; color: var(--white); line-height: 1.1; }
    .detail-ref { font-family: var(--sans); font-size: 10px; color: var(--muted); margin-top: 1px; }
    .detail-price-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .detail-price { font-family: var(--sans); font-size: 20px; font-weight: 500; color: var(--white); }
    .trend-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: rgba(74,148,104,0.15); border: 0.5px solid rgba(74,148,104,0.3);
      border-radius: 100px; padding: 2px 8px;
      font-family: var(--sans); font-size: 10px; color: var(--green);
    }
    .act-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .act-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 4px;
      background: var(--b1); border: 0.5px solid var(--b5); border-radius: 10px;
      font-family: var(--cinzel); font-size: 8px; color: var(--off-white);
      cursor: pointer; letter-spacing: 0.5px;
    }
    .act-btn.primary { background: var(--royal3); border-color: var(--royal3); color: var(--white); }
    .act-btn svg { width: 16px; height: 16px; }

    /* ── FEATURE TABS ── */
    .ftab-bar {
      display: flex; overflow-x: auto;
      background: var(--b3); border-bottom: 0.5px solid var(--b5);
      flex-shrink: 0;
    }
    .ftab-bar::-webkit-scrollbar { display: none; }
    .ftab {
      padding: 10px 14px;
      font-family: var(--cinzel); font-size: 9px; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent;
      white-space: nowrap; flex-shrink: 0; letter-spacing: 0.5px;
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .ftab.active { color: var(--accent3); border-bottom-color: var(--highlight); }

    /* ── INFO BLOCK ── */
    .info-block {
      background: var(--b2); border: 0.5px solid var(--b4);
      border-radius: 12px; padding: 13px 14px; margin-bottom: 10px;
    }
    .info-label {
      font-family: var(--cinzel); font-size: 8px; color: var(--accent2);
      letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px;
    }
    .info-text { font-family: var(--sans); font-size: 12px; color: var(--off-white); line-height: 1.65; }

    /* ── SPEC GRID ── */
    .spec-title { font-family: var(--cinzel); font-size: 8px; color: var(--accent2); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .spec-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      border: 0.5px solid var(--b4); border-radius: 12px; overflow: hidden; margin-bottom: 10px;
    }
    .spec-cell {
      padding: 10px 12px; border-bottom: 0.5px solid var(--b4); background: var(--b2);
    }
    .spec-cell:nth-child(odd) { border-right: 0.5px solid var(--b4); }
    .spec-key { font-family: var(--cinzel); font-size: 8px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 2px; }
    .spec-val { font-family: var(--sans); font-size: 12px; color: var(--white); }

    /* ── MODEL CARD ── */
    .model-card { background: var(--b2); border: 0.5px solid var(--b4); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
    .model-ref { font-family: var(--sans); font-size: 10px; color: var(--accent2); margin-bottom: 3px; }
    .model-desc { font-family: var(--serif); font-size: 15px; color: var(--white); margin-bottom: 5px; }
    .model-prices { display: flex; justify-content: space-between; }
    .model-retail { font-family: var(--sans); font-size: 11px; color: var(--muted); }
    .model-market { font-family: var(--sans); font-size: 11px; color: var(--green); }

    /* ── STAT ROW ── */
    .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .stat-box { background: var(--b2); border: 0.5px solid var(--b4); border-radius: 12px; padding: 12px; }
    .stat-label { font-family: var(--cinzel); font-size: 8px; color: var(--accent2); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 4px; }
    .stat-val { font-family: var(--sans); font-size: 15px; font-weight: 500; color: var(--white); }

    /* ── AUCTION ── */
    .auction-card { background: var(--b2); border: 0.5px solid var(--accent); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .auction-title { font-family: var(--cinzel); font-size: 13px; color: var(--accent2); margin-bottom: 3px; letter-spacing: 0.5px; }
    .auction-sub { font-family: var(--sans); font-size: 10px; color: var(--muted); margin-bottom: 14px; }
    .auction-vals { display: grid; grid-template-columns: 1fr 1fr 1fr; }
    .auction-val { text-align: center; }
    .auction-val:nth-child(2) { border-left: 0.5px solid var(--b4); border-right: 0.5px solid var(--b4); }
    .auction-label { font-family: var(--cinzel); font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
    .auction-num { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--white); }
    .auction-est { font-family: var(--sans); font-size: 16px; font-weight: 500; color: var(--accent2); }

    /* ── TIMELINE ── */
    .timeline { padding-left: 14px; border-left: 0.5px solid var(--b4); margin-bottom: 10px; }
    .timeline-item { margin-bottom: 14px; padding-left: 10px; position: relative; }
    .timeline-dot {
      position: absolute; left: -16px; top: 4px;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--b4); border: 1.5px solid var(--accent);
    }
    .timeline-year { font-family: var(--cinzel); font-size: 8px; color: var(--accent2); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 2px; }
    .timeline-text { font-family: var(--sans); font-size: 12px; color: var(--off-white); line-height: 1.55; }

    /* ── LOADING / ERROR ── */
    .loading-box { padding: 32px; text-align: center; }
    .spinner {
      width: 24px; height: 24px; border: 2px solid var(--b4);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: var(--sans); font-size: 12px; color: var(--muted); }

    /* ── COLLECTION / WISHLIST ── */
    .page-top {
      padding: 16px 16px 14px; background: var(--b2);
      border-bottom: 0.5px solid var(--b4); flex-shrink: 0;
      padding-top: max(16px, env(safe-area-inset-top));
    }
    .page-title { font-family: var(--cinzel); font-size: 18px; color: var(--white); letter-spacing: 2px; margin-bottom: 14px; }
    .add-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px; margin: 12px 16px 0;
      border: 0.5px solid var(--b4); border-radius: 10px;
      background: none; font-family: var(--cinzel); font-size: 10px;
      color: var(--accent2); cursor: pointer; letter-spacing: 0.8px;
    }
    .collection-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--b2); border: 0.5px solid var(--b4);
      border-radius: 14px; padding: 13px; margin-bottom: 8px; cursor: pointer;
    }
    .item-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--royal); display: flex; align-items: center; justify-content: center;
      font-family: var(--cinzel); font-size: 11px; color: var(--accent3); flex-shrink: 0;
    }
    .item-name { font-family: var(--serif); font-size: 14px; color: var(--white); }
    .item-sub { font-family: var(--sans); font-size: 10px; color: var(--muted); margin-top: 1px; }
    .item-val { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--white); }
    .item-gain { font-family: var(--sans); font-size: 10px; color: var(--green); margin-top: 2px; }

    /* ── WATCHMAKER ── */
    .wm-inputs {
      padding: 14px 16px; background: var(--b2);
      border-bottom: 0.5px solid var(--b4); flex-shrink: 0;
    }
    .wm-input {
      width: 100%; background: var(--b1); border: 0.5px solid var(--b4);
      border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
      font-family: var(--sans); font-size: 13px; color: var(--white); outline: none;
    }
    .wm-input::placeholder { color: var(--muted); }
    .begin-btn {
      width: 100%; padding: 11px; background: var(--royal3); border: none;
      border-radius: 10px; font-family: var(--cinzel); font-size: 11px;
      color: var(--white); cursor: pointer; letter-spacing: 1px;
    }
    .change-btn {
      width: 100%; padding: 11px; background: none;
      border: 0.5px solid var(--b4); border-radius: 10px;
      font-family: var(--cinzel); font-size: 11px; color: var(--muted); cursor: pointer;
    }
    .wm-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; }
    .wm-empty-icon { width: 48px; height: 48px; border-radius: 50%; border: 1.5px solid var(--b4); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .wm-empty-title { font-family: var(--cinzel); font-size: 18px; color: var(--white); margin-bottom: 8px; letter-spacing: 1.5px; }
    .wm-empty-sub { font-family: var(--sans); font-size: 13px; color: var(--muted); line-height: 1.6; }
    .messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    .messages::-webkit-scrollbar { display: none; }
    .msg-row { display: flex; gap: 8px; align-items: flex-start; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-av {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; margin-top: 18px;
    }
    .msg-av.mk { background: var(--royal); border: 1px solid var(--royal2); }
    .msg-av.us { background: var(--royal3); }
    .bubble { max-width: 80%; padding: 10px 12px; border-radius: 12px; }
    .bubble.mk { background: var(--b2); border: 0.5px solid var(--b4); }
    .bubble.us { background: var(--royal3); }
    .msg-name { font-family: var(--cinzel); font-size: 8px; color: var(--accent2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .msg-text { font-family: var(--sans); font-size: 12px; color: var(--off-white); line-height: 1.65; }
    .bubble.us .msg-text { color: var(--white); }
    .suggestions { display: flex; overflow-x: auto; gap: 6px; padding: 8px 16px; border-top: 0.5px solid var(--b4); flex-shrink: 0; }
    .suggestions::-webkit-scrollbar { display: none; }
    .sugg { background: var(--b2); border: 0.5px solid var(--b4); border-radius: 8px; padding: 7px 11px; white-space: nowrap; font-family: var(--sans); font-size: 11px; color: var(--off-white); cursor: pointer; flex-shrink: 0; }
    .chat-input-row { display: flex; gap: 8px; padding: 10px 14px; background: var(--b2); border-top: 0.5px solid var(--b4); flex-shrink: 0; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
    .chat-input { flex: 1; background: var(--b1); border: 0.5px solid var(--b4); border-radius: 10px; padding: 9px 12px; font-family: var(--sans); font-size: 13px; color: var(--white); outline: none; resize: none; max-height: 80px; }
    .chat-input::placeholder { color: var(--muted); }
    .send-btn { width: 36px; height: 36px; background: var(--royal3); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; align-self: flex-end; }
    .send-btn:disabled { opacity: 0.35; }

    /* ── TAB BAR ── */
    .tab-bar {
      display: flex; background: var(--b1);
      border-top: 0.5px solid var(--b4); flex-shrink: 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 9px 4px 5px; cursor: pointer; border: none; background: none;
      border-top: 2px solid transparent; gap: 3px;
    }
    .tab svg { width: 22px; height: 22px; stroke: var(--muted); }
    .tab span { font-family: var(--cinzel); font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .tab.active { border-top-color: var(--highlight); }
    .tab.active svg { stroke: var(--accent2); }
    .tab.active span { color: var(--accent2); }

    /* ── SIMILAR BADGE ── */
    .sim-badge { background: rgba(80,128,208,0.15); border: 0.5px solid rgba(80,128,208,0.3); border-radius: 100px; padding: 2px 8px; font-family: var(--cinzel); font-size: 8px; color: var(--accent2); }
    .sim-model { font-family: var(--serif); font-size: 16px; color: var(--white); margin-bottom: 2px; }
    .sim-ref { font-family: var(--sans); font-size: 10px; color: var(--muted); margin-bottom: 6px; }

    @media (prefers-color-scheme: light) { body { background: var(--b1); } }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════ SEARCH SCREEN -->
<div id="screen-search" class="screen active" style="background: var(--b2);">
  <div class="header" style="padding-top: max(14px, env(safe-area-inset-top));">
    <div>
      <div class="logo-sub">Watch Intelligence</div>
      <div class="logo-name">ROLOY</div>
      <div class="logo-rule"></div>
    </div>
    <svg width="22" height="22" fill="none" stroke="var(--muted)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
  </div>
  <div class="search-wrap">
    <div class="search-input-wrap">
      <svg width="16" height="16" fill="none" stroke="var(--muted)" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" placeholder="Brand, model, reference…" onkeydown="if(event.key==='Enter')doSearch()">
    </div>
    <button class="search-btn" onclick="doSearch()">Search</button>
  </div>
  <div class="scroll">
    <div class="pad">
      <div class="tag-row" id="tagRow"></div>
      <div class="section-label">Trending</div>
      <div id="watchList"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ DETAIL SCREEN -->
<div id="screen-detail" class="screen" style="background: var(--b1);">
  <div class="detail-hero">
    <button class="back-btn" onclick="goBack()">

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SERVER = 'https://roloy-server-production.up.railway.app';
const MODEL  = 'claude-sonnet-4-20250514';

// ── WATCH DATA ───────────────────────────────────────────────────────────────
const WATCHES = [
  { id:'rolex-sub', brand:'Rolex', model:'Submariner Date', ref:'126610LN', refFull:'Ref. 126610LN · Oystersteel', price:'CHF 14,200', retail:'CHF 10,800', trend:'+8.4%/yr', auctionBase:13800, releaseYear:2020,
    models:[{ref:'126610LN',desc:'Black dial — Oystersteel',retail:'CHF 10,800',market:'CHF 14,200',premium:'+31.5%'},{ref:'126610LV',desc:'Green "Kermit" — Oystersteel',retail:'CHF 10,800',market:'CHF 16,500',premium:'+52.8%'},{ref:'126613LB',desc:'Blue dial — Rolesor',retail:'CHF 13,150',market:'CHF 18,200',premium:'+38.4%'}]},
  { id:'patek-naut', brand:'Patek Philippe', model:'Nautilus 5711/1A', ref:'5711/1A-010', refFull:'Ref. 5711/1A-010 · Stainless Steel', price:'CHF 118,000', retail:'CHF 29,270', trend:'+31.2%/yr', auctionBase:110000, releaseYear:1976,
    models:[{ref:'5711/1A-010',desc:'Blue dial, Steel (disc.)',retail:'CHF 29,270',market:'CHF 118,000',premium:'+303%'},{ref:'5711/1A-014',desc:'Olive Green, final ed.',retail:'CHF 29,270',market:'CHF 185,000',premium:'+532%'},{ref:'5726/1A-014',desc:'Annual Cal., Slate',retail:'CHF 52,000',market:'CHF 78,000',premium:'+50%'}]},
  { id:'ap-roo', brand:'Audemars Piguet', model:'Royal Oak 15500ST', ref:'15500ST', refFull:'Ref. 15500ST.OO.1220ST · Blue', price:'CHF 52,000', retail:'CHF 23,900', trend:'+14.7%/yr', auctionBase:48000, releaseYear:1972,
    models:[{ref:'15500ST.OO.1220ST',desc:'Blue — Steel',retail:'CHF 23,900',market:'CHF 52,000',premium:'+117%'},{ref:'15500ST.OO.1356ST',desc:'Grey — Steel',retail:'CHF 23,900',market:'CHF 50,000',premium:'+109%'},{ref:'15500OR.OO.1220OR',desc:'Blue — Rose Gold',retail:'CHF 59,200',market:'CHF 95,000',premium:'+60%'}]},
  { id:'omega-speed', brand:'Omega', model:'Speedmaster Professional', ref:'310.30.42.50', refFull:'Ref. 310.30.42.50.01.001 · Steel', price:'CHF 7,100', retail:'CHF 6,400', trend:'+3.1%/yr', auctionBase:6600, releaseYear:1957,
    models:[{ref:'310.30.42.50.01.001',desc:'Black, Hesalite, Steel',retail:'CHF 6,400',market:'CHF 7,100',premium:'+10.9%'},{ref:'310.32.42.50.02.001',desc:'Black, Sapphire, Steel',retail:'CHF 7,400',market:'CHF 8,200',premium:'+10.8%'}]},
  { id:'cartier-santos', brand:'Cartier', model:'Santos de Cartier', ref:'WSSA0018', refFull:'Ref. WSSA0018 · Large Model', price:'CHF 8,400', retail:'CHF 7,650', trend:'+5.8%/yr', auctionBase:7800, releaseYear:1904,
    models:[{ref:'WSSA0018',desc:'Large, Steel',retail:'CHF 7,650',market:'CHF 8,400',premium:'+9.8%'},{ref:'WSSA0010',desc:'Medium, Steel',retail:'CHF 7,150',market:'CHF 7,800',premium:'+9.1%'},{ref:'WGSA0018',desc:'Large, Rose Gold',retail:'CHF 17,800',market:'CHF 20,000',premium:'+12.4%'}]},
  { id:'vacheron', brand:'Vacheron Constantin', model:'Overseas Automatic', ref:'4500V/110A', refFull:'Ref. 4500V/110A-B483 · Steel', price:'CHF 29,500', retail:'CHF 24,200', trend:'+9.2%/yr', auctionBase:27000, releaseYear:1996,
    models:[{ref:'4500V/110A-B483',desc:'Blue, Steel',retail:'CHF 24,200',market:'CHF 29,500',premium:'+21.9%'},{ref:'4500V/110A-B128',desc:'Silver, Steel',retail:'CHF 24,200',market:'CHF 28,000',premium:'+15.7%'},{ref:'4500V/110R-B705',desc:'Grey, Rose Gold',retail:'CHF 34,100',market:'CHF 48,000',premium:'+40.8%'}]},
];

const TAGS = ['Submariner','Nautilus','Royal Oak','Speedmaster','Santos','Overseas'];
const FTABS = ['Overview','Models','Market','Auction','History','Similar'];
const WM_SUGGESTIONS = ['How does the movement work?','What makes this reference collectible?','How should I service this?','What are common issues?','Is this good to pass down?','What year variants are most desirable?'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentWatch = null;
let activeFTab = 0;
let tabCache = {};
let collection = JSON.parse(localStorage.getItem('roloy_collection') || '[]');
let wishlist   = JSON.parse(localStorage.getItem('roloy_wishlist')   || '[]');
let wmStarted  = false;
let wmName     = '';
let wmMessages = [];
let wmBusy     = false;

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  // Tags
  const tagRow = document.getElementById('tagRow');
  TAGS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tag'; btn.textContent = t;
    btn.onclick = () => { const w = WATCHES.find(w => w.model.toLowerCase().includes(t.toLowerCase()) || w.brand.toLowerCase().includes(t.toLowerCase())); if (w) openDetail(w); };
    tagRow.appendChild(btn);
  });
  // Watch list
  renderWatchList(WATCHES);
  renderCollection();
  renderWishlist();
  updateWmInput();
}

function renderWatchList(watches) {
  const list = document.getElementById('watchList');
  list.innerHTML = '';
  watches.forEach(w => {
    const div = document.createElement('div');
    div.className = 'watch-row';
    div.innerHTML = `
      <div class="watch-face"><svg width="22" height="22" fill="none" stroke="var(--accent)" stroke-width="1.2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="watch-info">
        <div class="watch-brand">${w.brand.toUpperCase()}</div>
        <div class="watch-model">${w.model}</div>
        <div class="watch-ref">${w.ref}</div>
      </div>
      <div class="watch-right">
        <div class="watch-price">${w.price}</div>
        <div class="watch-trend">↑ ${w.trend}</div>
      </div>`;
    div.onclick = () => openDetail(w);
    list.appendChild(div);
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function switchTab(name) {
  ['search','collection','watchmaker','wishlist'].forEach(t => {
    document.getElementById('screen-'+t).classList.remove('active');
    document.getElementById('tab-'+t)?.classList.remove('active');
  });
  document.getElementById('screen-detail').classList.remove('active');
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('tab-'+name)?.classList.add('active');
  if (name === 'collection') renderCollection();
  if (name === 'wishlist') renderWishlist();
}

function openDetail(watch) {
  currentWatch = watch; tabCache = {}; activeFTab = 0;
  document.getElementById('dBrand').textContent = watch.brand.toUpperCase();
  document.getElementById('dModel').textContent = watch.model;
  document.getElementById('dRef').textContent   = watch.refFull;
  document.getElementById('dPrice').textContent = watch.price;
  document.getElementById('dTrend').textContent = watch.trend;
  ['search','collection','watchmaker','wishlist'].forEach(t => {
    document.getElementById('screen-'+t).classList.remove('active');
    document.getElementById('tab-'+t)?.classList.remove('active');
  });
  document.getElementById('screen-detail').classList.add('active');
  buildFTabs(); loadFTab(0);
}

function goBack() {
  document.getElementById('screen-detail').classList.remove('active');
  document.getElementById('screen-search').classList.add('active');
  document.getElementById('tab-search').classList.add('active');
}

function doSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const match = WATCHES.find(w => w.brand.toLowerCase().includes(q) || w.model.toLowerCase().includes(q) || w.ref.toLowerCase().includes(q));
  if (match) { openDetail(match); document.getElementById('searchInput').value = ''; }
}

// ── FEATURE TABS ──────────────────────────────────────────────────────────────
function buildFTabs() {
  const bar = document.getElementById('ftabBar');
  bar.innerHTML = '';
  FTABS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'ftab' + (i === 0 ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => { activeFTab = i; document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); loadFTab(i); };
    bar.appendChild(btn);
  });
}

async function loadFTab(i) {
  const key = FTABS[i];
  const content = document.getElementById('ftabContent');
  if (tabCache[key]) { content.innerHTML = tabCache[key]; return; }
  if (key === 'Models') { const html = renderModels(); tabCache[key] = html; content.innerHTML = html; return; }
  content.innerHTML = `<div class="loading-box"><div class="spinner"></div><div class="loading-text">Loading…</div></div>`;

  let prompt = '';
  if (key === 'Overview') prompt = `Watch analyst. For ${currentWatch.brand} ${currentWatch.model} (${currentWatch.refFull}), respond ONLY valid JSON no markdown: {"description":"2 sentences","movement":"string","caseDiameter":"string","waterResistance":"string","bezel":"string","crystal":"string","bracelet":"string","lug":"string","powerReserve":"string","yearIntroduced":"string","significance":"1 sentence"}`;
  else if (key === 'Market') prompt = `Watch market analyst. For ${currentWatch.brand} ${currentWatch.model} (released ~${currentWatch.releaseYear}), ONLY valid JSON: {"releasePrice":"string","totalGain":"string","analysis":"3 sentences","outlook":"2 sentences","bubbleNote":"1 sentence"}`;
  else if (key === 'Auction') prompt = `Watch auction specialist. For ${currentWatch.brand} ${currentWatch.model}, ONLY valid JSON: {"houseInsight":"2 sentences","bestTime":"2 sentences","keyFactors":["string","string","string"]}`;
  else if (key === 'History') prompt = `Horology historian. For ${currentWatch.brand} ${currentWatch.model}, ONLY valid JSON: {"intro":"2 sentences","timeline":[{"year":"string","event":"string"},{"year":"string","event":"string"},{"year":"string","event":"string"},{"year":"string","event":"string"},{"year":"string","event":"string"}],"legacy":"2 sentences"}`;
  else if (key === 'Similar') prompt = `Watch curator. Recommend 5 watches similar to ${currentWatch.brand} ${currentWatch.model}. ONLY valid JSON array: [{"brand":"string","model":"string","ref":"string","price":"string","reason":"1 sentence","category":"alternative"}]`;

  try {
    const res = await fetch(`${SERVER}/chat`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ model:MODEL, max_tokens:700, messages:[{role:'user',content:prompt}] }) });
    const data = await res.json();
    const text = data.content?.map(b => b.text||'').join('').trim().replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);
    const html = renderTabHTML(key, parsed);
    tabCache[key] = html;
    content.innerHTML = html;
  } catch {
    content.innerHTML = `<div class="pad"><div class="info-block"><div class="info-text">Could not load. Please check your connection.</div></div></div>`;
  }
}

function renderTabHTML(key, d) {
  if (key === 'Overview') return `<div class="pad">
    <div class="info-block"><div class="info-label">About</div><div class="info-text">${d.description}</div></div>
    <div class="info-block"><div class="info-label">Significance</div><div class="info-text">${d.significance}</div></div>
    <div class="spec-title">Specifications</div>
    <div class="spec-grid">
      ${[['Movement',d.movement],['Case',d.caseDiameter],['Water res.',d.waterResistance],['Crystal',d.crystal],['Bezel',d.bezel],['Bracelet',d.bracelet],['Lug width',d.lug],['Power res.',d.powerReserve],['Retail',currentWatch.retail],['Introduced',d.yearIntroduced]].map(([k,v])=>`<div class="spec-cell"><div class="spec-key">${k}</div><div class="spec-val">${v||'—'}</div></div>`).join('')}
    </div></div>`;

  if (key === 'Market') return `<div class="pad">
    <div class="stat-row"><div class="stat-box"><div class="stat-label">Release price</div><div class="stat-val">${d.releasePrice}</div></div><div class="stat-box"><div class="stat-label">Total gain</div><div class="stat-val" style="color:var(--green)">${d.totalGain}</div></div></div>
    <div class="info-block"><div class="info-label">Price trajectory</div><div class="info-text">${d.analysis}</div></div>
    <div class="info-block"><div class="info-label">Outlook</div><div class="info-text">${d.outlook}</div></div>
    <div class="info-block"><div class="info-label">Bubble risk</div><div class="info-text">${d.bubbleNote}</div></div></div>`;

  if (key === 'Auction') return `<div class="pad">
    <div class="auction-card">
      <div class="auction-title">Auction Estimate</div>
      <div class="auction-sub">Hammer price · Excellent condition · Full set</div>
      <div class="auction-vals">
        <div class="auction-val"><div class="auction-label">Low</div><div class="auction-num">CHF ${(Math.round(currentWatch.auctionBase*0.83/100)*100).toLocaleString()}</div></div>
        <div class="auction-val"><div class="auction-label">Estimate</div><div class="auction-est">CHF ${currentWatch.auctionBase.toLocaleString()}</div></div>
        <div class="auction-val"><div class="auction-label">High</div><div class="auction-num">CHF ${(Math.round(currentWatch.auctionBase*1.17/100)*100).toLocaleString()}</div></div>
      </div>
    </div>
    <div class="info-block"><div class="info-label">Strategy</div><div class="info-text">${d.houseInsight}</div></div>
    <div class="info-block"><div class="info-label">Best timing</div><div class="info-text">${d.bestTime}</div></div>
    <div class="info-block"><div class="info-label">Key value factors</div>${d.keyFactors.map((f,i)=>`<div style="display:flex;gap:8px;margin-top:6px;"><span style="color:var(--accent2);font-size:12px;">${i+1}.</span><span class="info-text">${f}</span></div>`).join('')}</div></div>`;

  if (key === 'History') return `<div class="pad">
    <div class="info-block"><div class="info-label">Origins</div><div class="info-text">${d.intro}</div></div>
    <div class="timeline">${d.timeline.map(t=>`<div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-year">${t.year}</div><div class="timeline-text">${t.event}</div></div>`).join('')}</div>
    <div class="info-block"><div class="info-label">Legacy</div><div class="info-text">${d.legacy}</div></div></div>`;

  if (key === 'Similar') return `<div class="pad">${d.map(w=>`<div class="info-block"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><div class="info-label" style="margin-bottom:0;">${w.brand}</div><div class="sim-badge">${w.category}</div></div><div class="sim-model">${w.model}</div><div class="sim-ref">${w.ref} · ${w.price}</div><div class="info-text">${w.reason}</div></div>`).join('')}</div>`;

  return '';
}

function renderModels() {
  return `<div class="pad"><div class="spec-title" style="margin-bottom:12px;">Current references</div>${currentWatch.models.map(m=>`<div class="model-card"><div class="model-ref">${m.ref}</div><div class="model-desc">${m.desc}</div><div class="model-prices"><span class="model-retail">Retail ${m.retail}</span><span class="model-market">${m.premium} · ${m.market}</span></div></div>`).join('')}</div>`;
}

// ── COLLECTION & WISHLIST ─────────────────────────────────────────────────────
function addToCollection() {
  if (!currentWatch) return;
  if (!collection.find(w => w.id === currentWatch.id)) {
    collection.push({ id: currentWatch.id, brand: currentWatch.brand, model: currentWatch.model, price: currentWatch.price, addedAt: Date.now() });
    localStorage.setItem('roloy_collection', JSON.stringify(collection));
    showToast(`${currentWatch.model} added to Collection`);
  } else { showToast('Already in your collection'); }
}

function addToWishlist() {
  if (!currentWatch) return;
  if (!wishlist.find(w => w.id === currentWatch.id)) {
    wishlist.push({ id: currentWatch.id, brand: currentWatch.brand, model: currentWatch.model, price: currentWatch.price });
    localStorage.setItem('roloy_wishlist', JSON.stringify(wishlist));
    showToast(`${currentWatch.model} added to Wishlist`);
  } else { showToast('Already in your wishlist'); }
}

function renderCollection() {
  const list = document.getElementById('collectionList');
  const total = document.getElementById('collTotal');
  const gain = document.getElementById('collGain');
  if (collection.length === 0) {
    list.innerHTML = '<div class="info-block"><div class="info-text" style="text-align:center;padding:12px 0;">No watches yet. Search and tap Collect to add one.</div></div>';
    total.textContent = '—'; gain.textContent = '—'; return;
  }
  total.textContent = 'CHF ' + (collection.length * 25000).toLocaleString();
  gain.textContent = '+' + (Math.round(collection.length * 8.4 * 10) / 10) + '%';
  list.innerHTML = collection.map((w, i) => `
    <div class="collection-item">
      <div class="item-avatar">${w.brand.charAt(0)}</div>
      <div style="flex:1;min-width:0;">
        <div class="item-name">${w.model}</div>
        <div class="item-sub">${w.brand}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div class="item-val">${w.price}</div>
        <button onclick="removeFromCollection(${i})" style="font-family:var(--sans);font-size:9px;color:var(--muted);background:none;border:none;cursor:pointer;margin-top:2px;">Remove</button>
      </div>
    </div>`).join('');
}

function removeFromCollection(i) { collection.splice(i, 1); localStorage.setItem('roloy_collection', JSON.stringify(collection)); renderCollection(); }

function renderWishlist() {
  const list = document.getElementById('wishlistItems');
  if (wishlist.length === 0) {
    list.innerHTML = '<div class="info-block"><div class="info-text" style="text-align:center;padding:12px 0;">No watches yet. Search and tap Wishlist to save one.</div></div>'; return;
  }
  list.innerHTML = wishlist.map((w, i) => `
    <div class="collection-item">
      <div class="item-avatar" style="background:var(--b3);">
        <svg width="18" height="18" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div style="flex:1;min-width:0;">
        <div class="item-name">${w.model}</div>
        <div class="item-sub">${w.brand}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div class="item-val">${w.price}</div>
        <button onclick="removeFromWishlist(${i})" style="font-family:var(--sans);font-size:9px;color:var(--muted);background:none;border:none;cursor:pointer;margin-top:2px;">Remove</button>
      </div>
    </div>`).join('');
}

function removeFromWishlist(i) { wishlist.splice(i, 1); localStorage.setItem('roloy_wishlist', JSON.stringify(wishlist)); renderWishlist(); }

// ── WATCHMAKER ────────────────────────────────────────────────────────────────
const WM_SYSTEM = `You are a master watchmaker with 38 years of experience, trained in Geneva. You speak with warmth, precision, and deep passion for horology. Encyclopaedic knowledge of watch movements, complications, history, collecting, and servicing. Speak as if the client is seated in your atelier. 2-3 paragraphs, no bullet lists, warm and unhurried.`;

function updateWmInput() {
  document.getElementById('wmInput').addEventListener('input', function() {
    document.getElementById('wmSendBtn').disabled = !this.value.trim() || !wmStarted;
  });
}

function wmBegin() {
  const brand = document.getElementById('wmBrand').value.trim();
  const model = document.getElementById('wmModel').value.trim();
  if (!brand && !model) return;
  wmName = [brand, model].filter(Boolean).join(' ');
  wmStarted = true; wmMessages = [];
  document.getElementById('wmEmpty').style.display = 'none';
  document.getElementById('wmChat').style.display = 'flex';
  document.getElementById('wmBeginBtn').textContent = 'Change Watch';
  document.getElementById('wmBeginBtn').onclick = wmReset;
  document.getElementById('wmBrand').disabled = true;
  document.getElementById('wmModel').disabled = true;

  const opening = `Ah, the ${wmName}. A fine choice to bring to me. I have handled several of these in my years at the bench. What would you like to know?`;
  wmMessages.push({ role: 'assistant', content: opening });
  renderMessages();
  renderSuggestions();
}

function wmReset() {
  wmStarted = false; wmName = ''; wmMessages = [];
  document.getElementById('wmEmpty').style.display = 'flex';
  document.getElementById('wmChat').style.display = 'none';
  document.getElementById('wmBeginBtn').textContent = 'Begin Consultation';
  document.getElementById('wmBeginBtn').onclick = wmBegin;
  document.getElementById('wmBrand').disabled = false;
  document.getElementById('wmModel').disabled = false;
  document.getElementById('wmBrand').value = '';
  document.getElementById('wmModel').value = '';
}

async function wmSend(text) {
  const msg = text || document.getElementById('wmInput').value.trim();
  if (!msg || wmBusy) return;
  document.getElementById('wmInput').value = '';
  document.getElementById('wmSendBtn').disabled = true;
  wmMessages.push({ role: 'user', content: msg });
  renderMessages(); wmBusy = true;

  const apiMsgs = wmMessages
    .filter((m, i) => !(i === 0 && m.role === 'assistant'))
    .map((m, i) => i === 0 && m.role === 'user'
      ? { role: 'user', content: `We are discussing the ${wmName}. ${m.content}` }
      : { role: m.role, content: m.content }
    );

  addTyping();
  try {
    const res = await fetch(`${SERVER}/chat`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ model:MODEL, max_tokens:900, system:WM_SYSTEM, messages:apiMsgs }) });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content?.map(b => b.text||'').join('').trim();
    removeTyping();
    wmMessages.push({ role: 'assistant', content: reply });
    renderMessages();
    document.getElementById('wmSuggestions').style.display = 'none';
  } catch {
    removeTyping();
    wmMessages.push({ role: 'assistant', content: 'I apologise — a momentary issue. Please try again.' });
    renderMessages();
  }
  wmBusy = false;
}

function renderMessages() {
  const el = document.getElementById('wmMessages');
  el.innerHTML = wmMessages.map(m => `
    <div class="msg-row ${m.role === 'user' ? 'user' : ''}">
      <div class="msg-av ${m.role === 'user' ? 'us' : 'mk'}">
        ${m.role === 'user'
          ? '<svg width="12" height="12" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
          : '<svg width="12" height="12" fill="none" stroke="var(--accent2)" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'}
      </div>
      <div class="bubble ${m.role === 'user' ? 'us' : 'mk'}">
        <div class="msg-name">${m.role === 'assistant' ? 'The Watchmaker' : 'You'}</div>
        <div class="msg-text">${m.content}</div>
      </div>
    </div>`).join('');
  el.scrollTop = el.scrollHeight;
}

function addTyping() {
  const el = document.getElementById('wmMessages');
  const div = document.createElement('div');
  div.className = 'msg-row'; div.id = 'typing';
  div.innerHTML = `<div class="msg-av mk"><svg width="12" height="12" fill="none" stroke="var(--accent2)" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="bubble mk"><div class="msg-name">The Watchmaker</div><div style="display:flex;gap:4px;align-items:center;padding:2px 0;"><span style="width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite;display:inline-block;"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s 0.2s infinite;display:inline-block;"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s 0.4s infinite;display:inline-block;"></span></div></div>`;
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function renderSuggestions() {
  const el = document.getElementById('wmSuggestions');
  el.innerHTML = WM_SUGGESTIONS.map(s => `<button class="sugg" onclick="wmSend('${s}')">${s}</button>`).join('');
  el.style.display = 'flex';
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, { position:'fixed', bottom:'100px', left:'50%', transform:'translateX(-50%)', background:'var(--royal3)', color:'white', padding:'10px 20px', borderRadius:'100px', fontFamily:'var(--cinzel)', fontSize:'11px', letterSpacing:'0.5px', zIndex:'9999', whiteSpace:'nowrap', opacity:'1', transition:'opacity 0.3s' });
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

// Add bounce keyframe
const style = document.createElement('style');
style.textContent = '@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}';
document.head.appendChild(style);

init();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js");}</script>
